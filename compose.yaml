services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hikelog}
      POSTGRES_USER: ${POSTGRES_USER:-hikelog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hikelog}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - hikelog_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hikelog} -d ${POSTGRES_DB:-hikelog}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${API_IMAGE:-hikelog-api:latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ${API_ENV_FILE:-./deploy/env/api.env}
    ports:
      - "${API_PORT:-8000}:8000"

  web:
    image: ${WEB_IMAGE:-hikelog-web:latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_MAPYCOM_API_KEY: ${NEXT_PUBLIC_MAPYCOM_API_KEY:-}
        NEXT_PUBLIC_WEBPUSHR_PUBLIC_KEY: ${NEXT_PUBLIC_WEBPUSHR_PUBLIC_KEY:-}
        GOOGLE_ANALYTICS_ID: ${GOOGLE_ANALYTICS_ID:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    env_file:
      - ${WEB_ENV_FILE:-./deploy/env/web.env}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  hikelog_db:
